name: Build & Publish

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"             # Semantic version tags: v1.2.3
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/filip-cv

jobs:
  # ── 1. Lint & type-check ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run lint

  # ── 2. Build & push Docker image ────────────────────────────────────────────
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      image:   ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history for version calculation

      # ── Determine version ──────────────────────────────────────────────────
      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tagged release — use the tag exactly
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            # Main branch — use git describe for auto-versioning
            VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-$(git rev-parse --short HEAD)")
            VERSION="${VERSION#v}"
          else
            # PR / feature branch — use short SHA
            VERSION="pr-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      # ── Docker meta (tags + labels) ────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Build cache & QEMU (multi-arch optional) ───────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to GHCR ──────────────────────────────────────────────────────
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & push ───────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Image digest for audit ─────────────────────────────────────────────
      - name: Print image digest
        if: github.event_name != 'pull_request'
        run: echo "Image pushed with tags — ${{ steps.meta.outputs.tags }}"

  # ── 3. Auto-tag on main (if no tag exists) ──────────────────────────────────
  auto-tag:
    name: Auto-tag main
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get latest tag or start from v0.0.0
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")
          echo "Latest tag: ${LATEST}"

          # Parse major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "New tag: ${NEW_TAG}"

          # Only tag if there are new commits since last tag
          COMMITS=$(git log "${LATEST}..HEAD" --oneline 2>/dev/null | wc -l || echo "1")
          if [ "$COMMITS" -gt 0 ]; then
            git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG} [auto]"
            git push origin "${NEW_TAG}"
            echo "Tagged ${NEW_TAG}"
          else
            echo "No new commits — skipping auto-tag"
          fi
