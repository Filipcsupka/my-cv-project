name: Build & Push

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: filipcsupka/filip-cv

jobs:
  # ── 1. Lint — runs on every branch / PR ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run lint

  # ── 2. Build & push Docker image — only on push to main ──────────────────────
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-$(git rev-parse --short HEAD)")
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy-gitops:
    name: Update GitOps
    runs-on: ubuntu-latest
    needs: build
    env:
      INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}

    steps:
      - name: Validate infra repository token
        run: |
          if [ -z "${INFRA_REPO_TOKEN}" ]; then
            echo "::error::Missing repository secret INFRA_REPO_TOKEN. Create a fine-grained PAT with Contents: Read and write access to Filipcsupka/infra, then add it as a secret in this repository."
            exit 1
          fi

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Checkout infra repository
        uses: actions/checkout@v5
        with:
          repository: Filipcsupka/infra
          token: ${{ env.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update GitOps image tag
        working-directory: infra/gitops/apps/cv-web/overlays/prod
        run: kustomize edit set image ghcr.io/filipcsupka/filip-cv=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}

      - name: Commit GitOps image tag
        working-directory: infra
        run: |
          if git diff --quiet; then
            echo "No GitOps changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/cv-web/overlays/prod/kustomization.yaml
          git commit -m "deploy cv-web sha-${GITHUB_SHA::7}"
          git push

  # ── 3. Auto-tag on main ───────────────────────────────────────────────────────
  auto-tag:
    name: Auto-tag
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump patch version and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          COMMITS=$(git log "${LATEST}..HEAD" --oneline 2>/dev/null | wc -l || echo "1")
          if [ "$COMMITS" -gt 0 ]; then
            git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG} [auto]"
            git push origin "${NEW_TAG}"
            echo "Tagged ${NEW_TAG}"
          else
            echo "No new commits — skipping auto-tag"
          fi
